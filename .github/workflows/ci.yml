name: CI — RAG Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        env:
          OPENAI_API_KEY: "sk-test-placeholder"
          ANTHROPIC_API_KEY: "test-placeholder"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-pipeline:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name rag-test \
            -e OPENAI_API_KEY=sk-test \
            -e ANTHROPIC_API_KEY=test \
            -p 8000:8000 \
            rag-pipeline:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop rag-test
